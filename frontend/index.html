<!DOCTYPE html>
<html>

<head>
    <title>Campus Chatbot</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="dark">

    <!-- Sidebar -->
    <div class="sidebar">

        <!-- 🔥 FIXED HEADER -->
        <div class="sidebar-header">
            <h3>📜 Chat History</h3>
        </div>

        <!-- 🔥 SCROLLABLE CONTENT -->
        <div class="sidebar-content" id="history"></div>

    </div>

    <!-- Main -->
    <div class="main">

        <!-- Header -->
        <div class="header">
            <h2>🎓SASTRA Campus Knowledge Chatbot</h2>
            <button id="toggle">🌙</button>
        </div>

        <!-- Chat -->
        <div class="chat" id="chat"></div>

        <!-- Input -->
        <div class="input-box">
            <input id="input" placeholder="Ask your question..." />
            <button id="sendBtn">➤</button>
        </div>

    </div>

    <script src="script.js"></script>
</body>

</html>
